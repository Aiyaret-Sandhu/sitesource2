<!DOCTYPE html>
<html>
<head>
    <title>1:1 Network Match Test</title>
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
</head>
<body style="background:#0a0a0c; margin:0; display:flex; justify-content:center; align-items:center; height:100vh;">

    <div id="flash-container" style="width:800px; height:600px;"></div>

    <script>
        window.addEventListener("DOMContentLoaded", () => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            document.getElementById("flash-container").appendChild(player);

            // This grabs the current folder URL path: ".../electricman-2-hs.swf/"
            let currentURL = window.location.href;
            if (!currentURL.endsWith('/')) {
                currentURL += '/';
            }

            // We load the exact game file sitting right next to this HTML file inside the folder
            player.load(currentURL + "electricman-2-hs.swf");
        });
    </script>

</body>
</html>
